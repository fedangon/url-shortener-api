spring.application.name=url-shortener-api

# Configuracao do banco via variaveis de ambiente (ideal para Docker/Compose).
# Os valores apos ":" sao defaults para desenvolvimento local.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/url_shortener}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Em um projeto real, o recomendado e usar migrations (Flyway/Liquibase).
# Para este portfolio, mantemos o Hibernate gerenciando o schema.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Ajustes adicionais via env quando necessario.
spring.jpa.open-in-view=${SPRING_JPA_OPEN_IN_VIEW:true}
